version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ticketapp-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
    volumes:
      - ./Backend/Backend/Images:/app/Images
    restart: unless-stopped
    networks:
      - ticketapp-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: ticketapp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ticketapp-network

networks:
  ticketapp-network:
    driver: bridge
